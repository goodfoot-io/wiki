[package]
name = "git-mesh"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
gix = { version = "0.81", default-features = false, features = ["revision", "status", "sha1"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.0", features = ["v4"] }

[build-dependencies]
serde_json = "1"
