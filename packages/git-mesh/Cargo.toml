[package]
name = "git-mesh"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
gix = { version = "0.81.0", features = ["revision", "status", "sha1"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
similar = "2.7.0"
thiserror = "2.0.9"
uuid = { version = "1.23.1", features = ["v4"] }

[build-dependencies]
serde_json = "1.0.149"

[dev-dependencies]
tempfile = "3.27.0"
