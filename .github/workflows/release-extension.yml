name: Release Extension

on:
  push:
    tags:
      - "wiki-ext-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Production build
        working-directory: packages/extension
        run: yarn vscode:prepublish

      - name: Package extension
        working-directory: packages/extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: packages/extension
        run: npx vsce publish --pat ${{ secrets.WIKI_EXTENSION_VS_MARKETPLACE_TOKEN }} --no-dependencies

      - name: Publish to Open VSX
        working-directory: packages/extension
        run: npx ovsx publish *.vsix --pat ${{ secrets.WIKI_EXTENSION_OPEN_VSX_TOKEN }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/extension/*.vsix
