name: Release Extension

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Verify matching CLI release assets
        run: |
          VERSION=$(node -p "require('./packages/extension/package.json').version")
          EXPECTED_TAG="wiki-v${VERSION}"
          if [ "${EXPECTED_TAG}" != "${{ inputs.release_tag }}" ]; then
            echo "ERROR: release tag '${{ inputs.release_tag }}' does not match extension version ${VERSION}." >&2
            exit 1
          fi
          BASE_URL="https://github.com/goodfoot-io/wiki/releases/download/${{ inputs.release_tag }}"
          for asset in \
            wiki-cli-checksums.json \
            wiki-linux-x64 \
            wiki-linux-arm64 \
            wiki-darwin-x64 \
            wiki-darwin-arm64 \
            wiki-win32-x64.exe
          do
            curl -fsI "${BASE_URL}/${asset}" > /dev/null
          done

      - name: Production build
        working-directory: packages/extension
        run: yarn vscode:prepublish

      - name: Package extension
        working-directory: packages/extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: packages/extension
        run: npx vsce publish --pat ${{ secrets.WIKI_EXTENSION_VS_MARKETPLACE_TOKEN }} --no-dependencies

      - name: Publish to Open VSX
        working-directory: packages/extension
        run: npx ovsx publish *.vsix --pat ${{ secrets.WIKI_EXTENSION_OPEN_VSX_TOKEN }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: packages/extension/*.vsix
