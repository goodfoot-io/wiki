name: Release Extension

on:
  workflow_dispatch: # disabled: push tags re-enable when ready to publish

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Production build
        working-directory: packages/extension
        run: yarn vscode:prepublish

      - name: Package extension
        working-directory: packages/extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: packages/extension
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }} --no-dependencies

      - name: Publish to Open VSIX
        working-directory: packages/extension
        run: npx ovsx publish *.vsix --pat ${{ secrets.OVSX_PAT }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/extension/*.vsix
